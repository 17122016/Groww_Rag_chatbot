name: Daily RAG Ingestion Pipeline

on:
  schedule:
    # 3:45 AM UTC is exactly 9:15 AM IST
    - cron: '45 3 * * *'
  workflow_dispatch:

jobs:
  ingest-and-embed:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install All Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Implementation_Phases/Phase_A_Data_Ingestion/requirements.txt
          pip install -r Implementation_Phases/Phase_B_Preprocessing/requirements.txt
          pip install -r Implementation_Phases/Phase_C_Embedding/requirements.txt
          
      - name: "Step 1: Scrape Latest Data (Phase A)"
        run: |
          python Implementation_Phases/Phase_A_Data_Ingestion/scraper.py

      - name: "Step 2: Preprocess & Chunk (Phase B)"
        run: |
          python Implementation_Phases/Phase_B_Preprocessing/preprocessor.py

      - name: "Step 3: Generate Embeddings & Update Chroma Cloud (Phase C)"
        env:
          CHROMA_HOST: ${{ secrets.CHROMA_HOST }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
        run: |
          python Implementation_Phases/Phase_C_Embedding/embedder.py

      - name: Sync Logs and Processed Files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          # Only commit if there are changes (Metadata and processed chunks)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated RAG refresh: $(date)" && git push)
